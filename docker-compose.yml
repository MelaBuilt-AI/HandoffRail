# HandoffRail — Local Development Docker Compose
# Usage: docker compose up

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/handoffrail.db
      - LOG_LEVEL=info
    volumes:
      - db-data:/app/data
    restart: unless-stopped

volumes:
  db-data: